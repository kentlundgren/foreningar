<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bjerreds Saltsjöbad</title>

  <!--
    index.html – Landningssida / nav-sida för Bjerreds Saltsjöbad
    Innehåller enbart navigering till undersidorna.
    Förberedd för att ta emot mer information längre fram.

    Mappstruktur:
      index.html             ← denna fil (nav-sida)
      inpassering/
        index.html           ← skylt-sida (gamla + nya skyltar)
        skylt.html           ← digital entréskylt, svenska
        skylt_eng.html       ← digital entréskylt, engelska
        gammal_skylt.jpg     ← foto på den gamla fysiska skylten
      inpasseringar/
        index.html           ← inpasseringsstatistik med diagram
        data.html            ← redigerbar datatabell
  -->

  <style>
    /* ============================================================
       GRUNDINSTÄLLNINGAR
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:   #f5f0e8;
      --dark:   #2c2c2c;
      --muted:  #666;
      --border: #d4cfc6;
    }

    body {
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      background: var(--sand);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    /* ============================================================
       SIDHUVUD
       ============================================================ */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }

    /* ============================================================
       NAV-KORT – klickbara kort för varje undersida
       ============================================================ */
    .nav-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 480px;
    }

    /* Varje kort är en klickbar länk */
    .nav-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      text-decoration: none;
      color: var(--dark);
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: box-shadow 0.15s, transform 0.1s;
    }
    .nav-card:hover  { box-shadow: 0 5px 16px rgba(0,0,0,0.13); transform: translateY(-2px); }
    .nav-card:active { transform: translateY(0); }

    /* Färgad vänsterkant som ger varje kort en identitet */
    .nav-card.inpassering  { border-left: 4px solid #445f40; }
    .nav-card.statistik    { border-left: 4px solid #2a5fa0; }

    .nav-icon {
      font-size: 2rem;
      flex-shrink: 0;
      line-height: 1;
    }
    .nav-text strong {
      display: block;
      font-size: 1rem;
      font-weight: 700;
    }
    .nav-text span {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.15rem;
      display: block;
    }
    .nav-arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    /* ============================================================
       SIDFOT
       ============================================================ */
    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>Bjerreds Saltsjöbad</h1>
  <p>Kallbadhus &amp; bastu i Bjärred</p>
</header>

<!-- Navigationskort – ett per undersida -->
<nav class="nav-grid">

  <!-- Entréskylt -->
  <a class="nav-card inpassering" href="inpassering/">
    <span class="nav-icon">🚪</span>
    <span class="nav-text">
      <strong>Entréskylt</strong>
      <span>Hur du betalar och kommer in – gamla och nya skyltar</span>
    </span>
    <span class="nav-arrow">›</span>
  </a>

  <!-- Inpasseringsstatistik -->
  <a class="nav-card statistik" href="inpasseringar/">
    <span class="nav-icon">📊</span>
    <span class="nav-text">
      <strong>Inpasseringsstatistik</strong>
      <span>Månadsvis statistik med diagram och tabeller</span>
    </span>
    <span class="nav-arrow">›</span>
  </a>

</nav>

<footer>
  <a href="https://bjerredskallbadhus.se" target="_blank" rel="noopener">bjerredskallbadhus.se</a>
</footer>

</body>
</html>
